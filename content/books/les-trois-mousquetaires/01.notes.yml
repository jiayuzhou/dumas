notes:
  - sentence: fr-010
    label: vocabulary
    text: '"bourg" — a small market town, smaller than a city (ville) but larger than a village.'

  - sentence: fr-010
    label: history
    text: 'The "Roman de la Rose" is a medieval French poem (c. 1230–1275). Dumas places the story in Meung-sur-Loire, its author Guillaume de Lorris''s birthplace.'

  - sentence: fr-020
    label: vocabulary
    text: '"cuirasse" — a breastplate or piece of body armor. The burghers are arming themselves as if for battle.'

  - sentence: fr-030
    label: vocabulary
    text: '"pertuisane" — a type of polearm (halberd). An archaic weapon even by 1625 standards, suggesting these townspeople are not professional soldiers.'

  - sentence: fr-030
    label: grammar
    text: '"Appuyant leur contenance..." — a present participle construction (gérondif) meaning "propping up their somewhat uncertain bearing." Note "quelque peu" (somewhat) adding irony.'

  - sentence: fr-050
    label: context
    text: '"les paniques étaient fréquentes" — Dumas sets the era: 1625 France under Louis XIII was marked by religious wars, court intrigue, and general unrest.'
