notes:
  - sentence: zh-010
    label: vocabulary
    text: '黄昏 (huánghūn) — dusk, twilight. Sets an atmospheric, liminal mood.'

  - sentence: zh-020
    label: grammar
    text: '在她头顶清脆作响 — literally "above her head crisply made sound." 清脆 (qīngcuì) describes a clear, pleasant ringing sound.'

  - sentence: zh-050
    label: expression
    text: '仿佛在说 — "as if saying." A common literary device in Chinese to attribute unspoken thoughts or feelings.'
